<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parking Tax Calculator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            font-size: 16px;
            line-height: 1.5;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            padding: 20px 15px;
            min-height: 100vh;
        }
        h1 {
            color: #1a3c5e;
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            text-align: center;
        }
        p {
            text-align: center;
            margin: 0 0 20px 0;
            color: #555;
        }
        label {
            display: block;
            margin: 18px 0 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        select, input {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px; /* Prevents zoom on iOS */
            background: white;
        }
        button {
            width: 100%;
            background: #1a3c5e;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 25px 0 10px;
            cursor: pointer;
        }
        button:hover {
            background: #2a5a8c;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f0f4f8;
            border-radius: 12px;
            border: 2px solid #1a3c5e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.95rem;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #1a3c5e;
            color: white;
        }
        .highlight {
            background: #e6f0ff;
            color: black !important;
        }
        .exemptions {
            background: #e6f7e6;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #4caf50;
            margin: 20px 0;
            font-size: 0.95rem;
        }
        @media (min-width: 768px) {
            .container {
                max-width: 700px;
                padding: 30px;
                margin-top: 20px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚗 Parking Tax Calculator</h1>
    <p><strong>Draft</strong></p>

    <label>1. Country</label>
    <select id="country" onchange="updateStates()"></select>

    <label>2. State / Province</label>
    <select id="state" onchange="updateCities()"></select>

    <label>3. City (optional)</label>
    <select id="city" onchange="updateExemptionDropdown()"></select>

    <label>Parking Type</label>
    <select id="parkingType">
        <option value="short">Short Term / Adhoc</option>
        <option value="subscription">Monthly Subscription</option>
    </select>

    <label>Exemption Code (optional)</label>
    <select id="exemptionCode">
        <option value="">No Exemption (Generic)</option>
    </select>

    <label>Parking Charge Amount</label>
    <input type="number" id="charge" value="100" step="0.01">

    <button onclick="calculateTax()">Calculate Taxes</button>

    <div id="output" class="result" style="display:none;"></div>
</div>

<script>
let parkingDB = {}, countryNames = {}, jurisdictions = {}, exemptionsMaster = {};

async function loadData() {
    try {
        [parkingDB, countryNames, jurisdictions, exemptionsMaster] = await Promise.all([
            fetch('parkingDB.json').then(r => r.json()),
            fetch('countryNames.json').then(r => r.json()),
            fetch('jurisdictions.json').then(r => r.json()),
            fetch('exemptions.json').then(r => r.json())
        ]);
        populateCountries();
    } catch (e) {
        alert("JSON files not found.");
    }
}

// All other functions remain the same as previous version
function populateCountries() { /* ... same as before ... */ }
function updateStates() { /* ... same ... */ }
function updateCities() { /* ... same ... */ }
function updateExemptionDropdown() { /* ... same ... */ }
function calculateTax() { /* ... same as last version ... */ }

loadData();
</script>
</body>
</html>
