<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Tax Calculator</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 20px; background: #f8f9fa;}
        .container {max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);}
        h1 {color: #1a3c5e;}
        label {display: block; margin: 15px 0 5px; font-weight: bold;}
        select, input {width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
        button {background: #1a3c5e; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px;}
        button:hover {background: #2a5a8c;}
        .result {margin-top: 30px; padding: 25px; background: #f0f4f8; border-radius: 8px; border: 2px solid #1a3c5e;}
        table {width: 100%; border-collapse: collapse; margin: 20px 0;}
        th, td {padding: 12px; text-align: left; border-bottom: 1px solid #ddd;}
        th {background: #1a3c5e; color: white;}
        .highlight {background: #e6f0ff; color: black !important;}
        .note {font-size: 0.9em; color: #555; margin-top: 20px;}
    </style>
</head>
<body>
<div class="container">
    <h1>🚗 Parking Tax Calculator</h1>
    <p><strong>Draft</strong></p>

    <label>1. Country</label>
    <select id="country" onchange="updateStates()"></select>

    <label>2. State / Province</label>
    <select id="state" onchange="updateCities()"></select>

    <label>3. City (optional)</label>
    <select id="city"></select>

    <label>Parking Charge Amount</label>
    <input type="number" id="charge" value="100" step="0.01">

    <button onclick="calculateTax()">Calculate Taxes</button>

    <div id="output" class="result" style="display:none;"></div>

    <div class="note">
        Content sourced from publicly available data
    </div>
</div>
m publi
<script>
let parkingDB = {}, countryNames = {}, jurisdictions = {};c

async function loadData() {
    try {
        [parkingDB, countryNames, jurisdictions] = await Promise.all([
            fetch('parkingDB.json').then(r => r.json()),
            fetch('countryNames.json').then(r => r.json()),
            fetch('jurisdictions.json').then(r => r.json())
        ]);
        populateCountries();
    } catch (e) {
        alert("JSON files not found. Put all 4 files in the same folder.");
    }
}

function populateCountries() {
    const sel = document.getElementById("country");
    sel.innerHTML = "";
    Object.keys(jurisdictions).forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = countryNames[code] || code;
        sel.appendChild(opt);
    });
    updateStates();
}

function updateStates() {
    const country = document.getElementById("country").value;
    const sel = document.getElementById("state");
    sel.innerHTML = "<option value=''>-- Select --</option>";

    if (jurisdictions[country] && jurisdictions[country].states) {
        jurisdictions[country].states.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s.code;
            opt.textContent = `${s.code} — ${s.name}`;
            sel.appendChild(opt);
        });
    }
    updateCities();
}

function updateCities() {
    const country = document.getElementById("country").value;
    const state = document.getElementById("state").value;
    const sel = document.getElementById("city");
    sel.innerHTML = "<option value=''>General / State Default</option>";

    if (jurisdictions[country] && jurisdictions[country].cities && jurisdictions[country].cities[state]) {
        jurisdictions[country].cities[state].forEach(city => {
            const opt = document.createElement("option");
            opt.value = city;
            opt.textContent = city;
            sel.appendChild(opt);
        });
    }
}

function calculateTax() {
    const countryCode = document.getElementById("country").value;
    const stateCode = document.getElementById("state").value;
    const cityCode = document.getElementById("city").value;
    let charge = parseFloat(document.getElementById("charge").value) || 0;

    const key = cityCode || stateCode || countryCode;
    const countryName = countryNames[countryCode] || countryCode;

    let data = parkingDB[key] || parkingDB["DEFAULTS"][countryCode] || 
               {dedicated:0, sales:0, stacking:false, exemptions:"Standard rules apply", note:"Verify locally"};

    const dedicatedRate = data.dedicated || 0;
    const salesRate = data.sales || 0;
    const totalRate = dedicatedRate + salesRate;

    const dedEx = charge * (dedicatedRate / 100);
    const salesEx = charge * (salesRate / 100);
    const totalTaxEx = dedEx + salesEx;
    const totalPayEx = charge + totalTaxEx;

    let baseInc = totalRate > 0 ? charge / (1 + totalRate / 100) : charge;
    const dedInc = baseInc * (dedicatedRate / 100);
    const salesInc = baseInc * (salesRate / 100);
    const totalTaxInc = dedInc + salesInc;

    let html = `
        <h2>Results for ${cityCode || stateCode || 'General'} (${countryName}) — Charge: $${charge.toFixed(2)}</h2>
        <table>
            <thead><tr><th>Category</th><th>Rate</th><th class="highlight">Tax Exclusive</th><th class="highlight">Tax Inclusive</th></tr></thead>
            <tbody>
                <tr><td><strong>Dedicated Parking Tax</strong></td><td>${dedicatedRate}%</td><td>$${dedEx.toFixed(2)}</td><td>$${dedInc.toFixed(2)}</td></tr>
                <tr><td><strong>Sales / VAT / GST / HST</strong></td><td>${salesRate}%</td><td>$${salesEx.toFixed(2)}</td><td>$${salesInc.toFixed(2)}</td></tr>
                <tr style="background:#d4e4ff; font-weight:bold;"><td><strong>Total Tax</strong></td><td>${totalRate}% ${data.stacking ? '(stacked)' : ''}</td><td>$${totalTaxEx.toFixed(2)}</td><td>$${totalTaxInc.toFixed(2)}</td></tr>
                <tr><td>Pre-tax Base</td><td>—</td><td>$${charge.toFixed(2)}</td><td>$${baseInc.toFixed(2)}</td></tr>
                <tr style="font-weight:bold;"><td><strong>Total Payable</strong></td><td>—</td><td>$${totalPayEx.toFixed(2)}</td><td>$${charge.toFixed(2)}</td></tr>
            </tbody>
        </table>
        <table style="margin-top:20px;">
            <tr><td><strong>Country</strong></td><td>${countryName}</td></tr>
            <tr><td><strong>State / Province</strong></td><td>${stateCode || '—'}</td></tr>
            <tr><td><strong>City</strong></td><td>${cityCode || 'General'}</td></tr>
            <tr><td><strong>Exemptions</strong></td><td>${data.exemptions}</td></tr>
            <tr><td><strong>Notes</strong></td><td>${data.note}</td></tr>
        </table>
    `;

    document.getElementById("output").innerHTML = html;
    document.getElementById("output").style.display = "block";
}

loadData();
</script>
</body>
</html>
