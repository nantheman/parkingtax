<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parking Tax Calculator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            font-size: 16px;
            line-height: 1.5;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            padding: 20px 15px;
            min-height: 100vh;
        }
        h1 {
            color: #1a3c5e;
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            text-align: center;
        }
        p { text-align: center; margin: 0 0 20px 0; color: #555; }
        label {
            display: block;
            margin: 18px 0 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        select, input {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        button {
            width: 100%;
            background: #1a3c5e;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 25px 0 10px;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f0f4f8;
            border-radius: 12px;
            border: 2px solid #1a3c5e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.95rem;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background: #1a3c5e; color: white; }
        .highlight { background: #e6f0ff; color: black !important; }
        .exemptions {
            background: #e6f7e6;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #4caf50;
            margin: 20px 0;
            font-size: 0.95rem;
        }
        @media (min-width: 768px) {
            .container { max-width: 700px; padding: 30px; margin-top: 20px; border-radius: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚗 Parking Tax Calculator</h1>
    <p><strong>Draft</strong></p>

    <label>1. Country</label>
    <select id="country" onchange="updateStates()"></select>

    <label>2. State / Province</label>
    <select id="state" onchange="updateCities()"></select>

    <label>3. City (optional)</label>
    <select id="city" onchange="updateExemptionDropdown()"></select>

    <label>Parking Type</label>
    <select id="parkingType">
        <option value="short">Short Term / Adhoc</option>
        <option value="subscription">Monthly Subscription</option>
    </select>

    <label>Exemption Code (optional)</label>
    <select id="exemptionCode">
        <option value="">No Exemption (Generic)</option>
    </select>

    <label>Parking Charge Amount</label>
    <input type="number" id="charge" value="100" step="0.01">

    <button onclick="calculateTax()">Calculate Taxes</button>

    <div id="output" class="result" style="display:none;"></div>
</div>

<script>
let parkingDB = {}, countryNames = {}, jurisdictions = {}, exemptionsMaster = {};

async function loadData() {
    try {
        [parkingDB, countryNames, jurisdictions, exemptionsMaster] = await Promise.all([
            fetch('parkingDB.json').then(r => r.json()),
            fetch('countryNames.json').then(r => r.json()),
            fetch('jurisdictions.json').then(r => r.json()),
            fetch('exemptions.json').then(r => r.json())
        ]);
        populateCountries();
    } catch (e) {
        alert("JSON files not found. Please check all files are in the same folder.");
    }
}

function populateCountries() {
    const sel = document.getElementById("country");
    sel.innerHTML = "";
    Object.keys(jurisdictions).forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = countryNames[code] || code;
        sel.appendChild(opt);
    });
    updateStates();
}

function updateStates() {
    const country = document.getElementById("country").value;
    const sel = document.getElementById("state");
    sel.innerHTML = "<option value=''>-- Select --</option>";

    if (jurisdictions[country] && jurisdictions[country].states) {
        jurisdictions[country].states.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s.code;
            opt.textContent = `${s.code} — ${s.name}`;
            sel.appendChild(opt);
        });
    }
    updateCities();
}

function updateCities() {
    const country = document.getElementById("country").value;
    const state = document.getElementById("state").value;
    const sel = document.getElementById("city");
    sel.innerHTML = "<option value=''>General / State Default</option>";

    if (jurisdictions[country] && jurisdictions[country].cities && jurisdictions[country].cities[state]) {
        jurisdictions[country].cities[state].forEach(city => {
            const opt = document.createElement("option");
            opt.value = city;
            opt.textContent = city;
            sel.appendChild(opt);
        });
    }
    updateExemptionDropdown();
}

function updateExemptionDropdown() {
    const country = document.getElementById("country").value;
    const state = document.getElementById("state").value;
    const city = document.getElementById("city").value;
    const sel = document.getElementById("exemptionCode");
    sel.innerHTML = "<option value=''>No Exemption (Generic)</option>";

    const key = city || state || country;
    const data = parkingDB[key] || parkingDB["DEFAULTS"][country] || {exemptions: []};

    data.exemptions.forEach(code => {
        if (exemptionsMaster[code]) {
            const opt = document.createElement("option");
            opt.value = code;
            opt.textContent = code;
            sel.appendChild(opt);
        }
    });
}

function calculateTax() {
    const countryCode = document.getElementById("country").value;
    const stateCode = document.getElementById("state").value;
    const cityCode = document.getElementById("city").value;
    const isSubscription = document.getElementById("parkingType").value === "subscription";
    const selectedExemption = document.getElementById("exemptionCode").value;
    let charge = parseFloat(document.getElementById("charge").value) || 0;

    const key = cityCode || stateCode || countryCode;
    const countryName = countryNames[countryCode] || countryCode;

    let data = parkingDB[key] || parkingDB["DEFAULTS"][countryCode] || 
               {shortTermParking:0, shortTermSales:0, subscriptionParking:0, subscriptionSales:0, stacking:false, exemptions:[], note:"Verify locally"};

    let parkingRate = isSubscription ? (data.subscriptionParking || data.shortTermParking || 0) : (data.shortTermParking || 0);
    let salesRate = isSubscription ? (data.subscriptionSales || data.shortTermSales || 0) : (data.shortTermSales || 0);

    const totalRate = parkingRate + salesRate;

    const parkingEx = charge * (parkingRate / 100);
    const salesEx = charge * (salesRate / 100);
    const totalTaxEx = parkingEx + salesEx;
    const totalPayEx = charge + totalTaxEx;

    let baseInc = totalRate > 0 ? charge / (1 + totalRate / 100) : charge;
    const parkingInc = baseInc * (parkingRate / 100);
    const salesInc = baseInc * (salesRate / 100);
    const totalTaxInc = parkingInc + salesInc;

    let applicableList = data.exemptions.map(code => 
        exemptionsMaster[code] ? `<strong>${code}:</strong> ${exemptionsMaster[code]}` : code
    ).join("<br>");

    if (!applicableList) applicableList = "No specific exemptions listed for this location";

    let selectedText = "";
    if (selectedExemption) {
        if (data.exemptions.includes(selectedExemption)) {
            selectedText = `<strong>Applied Exemption:</strong> ${selectedExemption}<br>${exemptionsMaster[selectedExemption]}`;
        } else {
            selectedText = `<strong style="color:orange;">Chosen exemption (${selectedExemption}) does not apply here.</strong>`;
        }
    }

    let html = `
        <h2>Results for ${cityCode || stateCode || 'General'} (${countryName}) — ${isSubscription ? 'Monthly Subscription' : 'Short Term/Adhoc'} — Charge: $${charge.toFixed(2)}</h2>
        <table>
            <thead><tr><th>Category</th><th>Rate</th><th class="highlight">Tax Exclusive</th><th class="highlight">Tax Inclusive</th></tr></thead>
            <tbody>
                <tr><td><strong>Parking Tax</strong></td><td>${parkingRate}%</td><td>$${parkingEx.toFixed(2)}</td><td>$${parkingInc.toFixed(2)}</td></tr>
                <tr><td><strong>Sales / VAT / GST / HST</strong></td><td>${salesRate}%</td><td>$${salesEx.toFixed(2)}</td><td>$${salesInc.toFixed(2)}</td></tr>
                <tr style="background:#d4e4ff; font-weight:bold;"><td><strong>Total Tax</strong></td><td>${totalRate}% ${data.stacking ? '(stacked)' : ''}</td><td>$${totalTaxEx.toFixed(2)}</td><td>$${totalTaxInc.toFixed(2)}</td></tr>
                <tr><td>Pre-tax Base</td><td>—</td><td>$${charge.toFixed(2)}</td><td>$${baseInc.toFixed(2)}</td></tr>
                <tr style="font-weight:bold;"><td><strong>Total Payable</strong></td><td>—</td><td>$${totalPayEx.toFixed(2)}</td><td>$${charge.toFixed(2)}</td></tr>
            </tbody>
        </table>

        <div class="exemptions">
            <strong>Applicable Exemptions:</strong><br>
            ${applicableList}<br><br>
            ${selectedText}
        </div>

        <p><strong>Notes:</strong> ${data.note}</p>
    `;

    document.getElementById("output").innerHTML = html;
    document.getElementById("output").style.display = "block";
}

loadData();
</script>
</body>
</html>
